name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（台灣時間 10:00）自動更新 Podcast
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Notion images
        uses: actions/cache@v4
        with:
          path: src/assets/images
          key: notion-images-${{ github.run_id }}
          restore-keys: notion-images-

      - name: Build with 11ty
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB: ${{ secrets.NOTION_ARTICLES_DB }}
          NOTION_EVENTS_DB: ${{ secrets.NOTION_EVENTS_DB }}
          NOTION_PODCAST_DB: ${{ secrets.NOTION_PODCAST_DB }}
          PODCAST_RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
          SITE_BASE_PATH: /streamspsy/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
