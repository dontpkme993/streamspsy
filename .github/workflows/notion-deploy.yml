name: Deploy on Notion Update

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點檢查一次
  workflow_dispatch:       # 允許手動觸發

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Check Notion for updates and deploy if needed
        id: check
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB: ${{ secrets.NOTION_ARTICLES_DB }}
          NOTION_EVENTS_DB: ${{ secrets.NOTION_EVENTS_DB }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          LAST_BUILD_TIME: ${{ vars.LAST_BUILD_TIME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          node << 'EOF'
          const https = require('https');

          const NOTION_TOKEN = process.env.NOTION_TOKEN;
          const DBS = [
            process.env.NOTION_ARTICLES_DB,
            process.env.NOTION_EVENTS_DB,
          ].filter(Boolean);
          const LAST_BUILD_TIME = process.env.LAST_BUILD_TIME || '2000-01-01T00:00:00.000Z';

          console.log('上次 build 時間:', LAST_BUILD_TIME);
          console.log('監測 DB 數量:', DBS.length);

          function request(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(data) }); }
                  catch(e) { resolve({ status: res.statusCode, body: data }); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function checkDB(dbId) {
            const body = JSON.stringify({
              filter: {
                timestamp: 'last_edited_time',
                last_edited_time: { after: LAST_BUILD_TIME }
              }
            });
            const res = await request({
              hostname: 'api.notion.com',
              path: `/v1/databases/${dbId}/query`,
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${NOTION_TOKEN}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body),
              }
            }, body);

            if (res.status !== 200) {
              console.error(`DB ${dbId} 查詢失敗 (${res.status}):`, JSON.stringify(res.body));
              return 0;
            }
            const count = res.body.results?.length || 0;
            console.log(`DB ${dbId.slice(0,8)}... 有 ${count} 筆更新`);
            return count;
          }

          async function triggerDeploy() {
            const url = new URL(process.env.NETLIFY_BUILD_HOOK);
            const res = await request({
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'POST',
              headers: { 'Content-Length': 0 }
            });
            console.log('Netlify build 觸發，狀態:', res.status);
          }

          async function updateLastBuildTime(time) {
            const [owner, repo] = process.env.GH_REPO.split('/');
            const body = JSON.stringify({ name: 'LAST_BUILD_TIME', value: time });
            const res = await request({
              hostname: 'api.github.com',
              path: `/repos/${owner}/${repo}/actions/variables/LAST_BUILD_TIME`,
              method: 'PATCH',
              headers: {
                'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body),
                'User-Agent': 'notion-deploy-action',
              }
            }, body);

            // 如果 variable 不存在則改用 POST 建立
            if (res.status === 404) {
              await request({
                hostname: 'api.github.com',
                path: `/repos/${owner}/${repo}/actions/variables`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                  'User-Agent': 'notion-deploy-action',
                }
              }, body);
            }
            console.log('LAST_BUILD_TIME 更新為:', time);
          }

          (async () => {
            const now = new Date().toISOString();
            const counts = await Promise.all(DBS.map(checkDB));
            const totalUpdates = counts.reduce((a, b) => a + b, 0);

            if (totalUpdates > 0) {
              console.log(`共 ${totalUpdates} 筆更新，觸發 deploy...`);
              await triggerDeploy();
              await updateLastBuildTime(now);
            } else {
              console.log('沒有更新，跳過 deploy。');
            }
          })();
          EOF
