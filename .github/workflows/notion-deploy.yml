name: Deploy on Notion Update

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點檢查一次
  workflow_dispatch:       # 允許手動觸發

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Check Notion for article/event updates
        id: check-notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB: ${{ secrets.NOTION_ARTICLES_DB }}
          NOTION_EVENTS_DB: ${{ secrets.NOTION_EVENTS_DB }}
          LAST_BUILD_TIME: ${{ vars.LAST_BUILD_TIME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node .github/scripts/check-notion.js

      - name: Sync Podcast RSS to Notion
        id: sync-podcast
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PODCAST_DB: ${{ secrets.NOTION_PODCAST_DB }}
          PODCAST_RSS_URL: ${{ secrets.PODCAST_RSS_URL }}
        run: node .github/scripts/sync-podcast.js

      - name: Decide if deploy needed
        id: decide
        run: |
          if [ "${{ steps.check-notion.outputs.has_updates }}" == "true" ] || [ "${{ steps.sync-podcast.outputs.new_episodes }}" == "true" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit
