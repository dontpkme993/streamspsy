name: Deploy on Notion Update

on:
  schedule:
    - cron: '0 * * * *'  # 每小時整點檢查一次
  workflow_dispatch:       # 允許手動觸發

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Check Notion for updates
        id: check
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ARTICLES_DB: ${{ secrets.NOTION_ARTICLES_DB }}
          NOTION_EVENTS_DB: ${{ secrets.NOTION_EVENTS_DB }}
          LAST_BUILD_TIME: ${{ vars.LAST_BUILD_TIME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node .github/scripts/check-notion.js

  deploy:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
